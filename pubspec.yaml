name: migozz_app
description: "A new Flutter project."

publish_to: "none"

version: 1.3.0+3

environment:
  sdk: ^3.8.1

dependencies:
  qr_flutter: ^4.1.0

  tutorial_coach_mark: ^1.3.2

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.8

  get_it: ^8.2.0
  injectable: ^2.5.2

  cupertino_icons: ^1.0.8
  animate_do: ^4.2.0

  flutter_dotenv: ^6.0.0

  permission_handler: ^12.0.1 # permisos
  geolocator: ^14.0.2
  record: ^6.1.1 # grabar audio
  just_audio: ^0.10.5 # reproducir audio
  audio_waveforms: ^1.3.0 # mostrar ola de audio
  path_provider: ^2.1.5 # necesaria para guardar el audio
  intl_phone_field: ^3.2.0

  image_picker: ^1.2.1 # imagenes

  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  http: ^1.5.0 # validar email con OTP
  flutter_svg: ^2.0.9
  go_router: ^16.2.2 # refactor de la naveegacion
  google_generative_ai: ^0.4.6
  url_launcher: ^6.3.0
  location: ^8.0.1

  firebase_core: ^3.4.0 # necesaria para firebase
  cloud_firestore: ^5.6.0 # necesaria para firestore
  google_sign_in: ^7.2.0 # necesario para el inicio con google (v6.2.0 tiene soporte completo para web)
  url_strategy: ^0.3.0 # Elimina los numerales en las rutas
  firebase_auth: ^5.1.4 # para auth

  cloud_functions: ^5.6.2
  firebase_dynamic_links: ^6.1.10
  flutter_appauth: ^10.0.0
  firebase_storage: ^12.4.10
  share_plus: ^7.2.1
  cached_network_image: ^3.4.1
  flutter_native_splash: ^2.4.7
  shared_preferences: ^2.5.3
  universal_html: ^2.3.0
  universal_io: ^2.3.1
  mobile_scanner: ^7.1.3
  pull_to_refresh: ^2.0.0
  sign_in_with_apple: ^7.0.1
  flutter_staggered_grid_view: ^0.7.0
  firebase_messaging: ^15.2.10
  awesome_notifications: ^0.10.1
  flutter_screenutil: ^5.9.3 # responsive design
  camera: ^0.11.4
  file_selector: ^1.1.0
  file_picker: ^10.3.10
  flutter_stripe: ^12.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  injectable_generator: ^2.9.0
  build_runner: ^2.9.0

# flutter_launcher_icons:
#   android: true
#   ios: true
#   image_path: "assets/icon/Migozz_SinFONDO.svg"
#   adaptive_icon_background: "#0D0D0D"
#   adaptive_icon_foreground: "assets/icon/Migozz.svg"
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/migozz_icon/Migozz1024.png"
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/migozz_icon/Migozz1024.png"
  web:
    generate: true
    image_path: "assets/migozz_icon/Migozz512.png"
  windows:
    generate: true
    image_path: "assets/migozz_icon/Migozz1024.png"
flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/images/
    - assets/translations/
    - assets/icons/account_type/
    - assets/icons/
    - assets/migozz_icon/
    - assets/emojis/
    - assets/icons/social_networks/
    - assets/icons/social_networks/social_black_white_icons/
    - assets/images/landing/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
  # Updated to force rebuild

  fonts:
    - family: Bebas Neue
      fonts:
        - asset: fonts/BebasNeue-Regular.ttf
