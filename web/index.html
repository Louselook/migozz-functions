  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;

          background-size: 100% 100%;

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      max-width: 180px;
      max-height: 180px;
    }

    /* Pantallas móviles pequeñas */
    @media (max-width: 480px) {
      .center {
        max-width: 200px;
        max-height: 200px;
      }
    }

    /* Pantallas móviles altas (como S25 Ultra) */
    @media (max-width: 500px) and (min-height: 700px) {
      .center {
        max-width: 200px;
        max-height: 200px;
      }
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);

    .bottomLeft {
      position: absolute;

      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;

    }
