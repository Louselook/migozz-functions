name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Create .env from secrets
        run: |
          echo "API_MIGOZZ=${{ secrets.API_MIGOZZ }}" > .env
          echo "API_FUNCTIONS=${{ secrets.API_FUNCTIONS }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --dart-define-from-file=.env

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIGOZZ_E2A21 }}
          channelId: live
          projectId: migozz-e2a21
