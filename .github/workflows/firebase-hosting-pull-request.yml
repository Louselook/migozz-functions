name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Create .env from secrets
        run: |
          echo "API_MIGOZZ=${{ secrets.API_MIGOZZ }}" > .env
          echo "API_FUNCTIONS=${{ secrets.API_FUNCTIONS }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web \
            --dart-define=API_MIGOZZ=${{ secrets.API_MIGOZZ }} \
            --dart-define=API_FUNCTIONS=${{ secrets.API_FUNCTIONS }} \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIGOZZ_E2A21 }}
          projectId: migozz-e2a21
